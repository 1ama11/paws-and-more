<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Adoption Form - Paws and More</title>
    <link rel="stylesheet" href="adoption.css">
</head>
<body>
    <header class="adopt-topbar">
        <div class="adopt-brand"><a href="index.html">🐾 Paws & More</a></div>
        <nav class="adopt-nav">
            <a href="index.html">Home</a>
            <a href="shop.html">Shop</a>
            <a href="adoption.html" class="active">Adoption</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
            <a href="policy.html">Policy</a>
        </nav>
        <div style="display:flex;align-items:center;gap:10px;">
            <a href="login.html" class="btn btn--sm">Login</a>
            <a href="register.html" class="btn btn--sm">Sign Up</a>
            <a href="profile.html" class="btn btn--sm">Profile</a>
            <a href="shop.html#cart" class="nav-cart">
             🛒 <span class="cart-count" id="nav-cart-count" style="display:none;">0</span></a>
        </div>
    </header>

    <div class="container">
        <h1>Adoption Application</h1>
        <form id="adoptForm" class="adoption-form">
            <div class="form-group">
                <label>Full Name:</label>
                <input type="text" id="fName" required placeholder="Your full name">
                <span id="nameError" class="error-message"></span>
            </div>

            <div class="form-group">
                <label>Email Address:</label>
                <input type="text" id="Email" required placeholder="abc@gmail.com">
                <span id="emailError" class="error-message"></span>
            </div>

            <div class="form-group">
                <label>Home Type:</label>
                <select id="homeType" required class="custom-select">
                    <option value="" disabled selected>Select your home type</option>
                    <option value="apartment">Apartment</option>
                    <option value="house">House</option>
                </select>
            </div>

            <div class="form-group">
                <label>Do you have other pets?</label>
                <div class="radio-options">
                    <label class="radio-container">
                        <input type="radio" name="otherPets" value="no" checked> No
                    </label>
                    <label class="radio-container">
                        <input type="radio" name="otherPets" value="yes"> Yes
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label>Pet Name:</label>
                <input type="text" id="pName" readonly>
            </div>

            <div class="form-group">
                <label>Message (Optional)</label>
                <textarea id="msg" placeholder="Tell us why..."></textarea>
            </div>

            <button type="submit" class="btn">Submit Application</button>
        </form>
    </div>

    <div id="successModal">
        <div class="modal-box">
            <h2>Application Received! 🐾</h2>
            <p>Thank you! We will contact you soon.</p>
            <br>
            <button onclick="window.location.href='adoption.html'" class="btn">Back to home page</button>
        </div>
    </div>

    <footer>
        <p class="footer-logo">Paws & More 🐾</p>
        <nav class="footer-nav">
            <a href="index.html">Home</a>
            <a href="shop.html">Shop</a>
            <a href="adoption.html">Adoption</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
            <a href="policy.html">Policy</a>
        </nav>
        <p class="footer-copy">© 2019 Paws & More. All rights reserved.</p>
    </footer>

    <script src="adoption.js"></script>
</body>
</html>
