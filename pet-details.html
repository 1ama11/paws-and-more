<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paws &amp; More 🐾 — Pet Details</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lato:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .pet-details-layout {
      max-width: 750px;
      margin: var(--space-xl) auto;
      background-color: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--border-radius);
      box-shadow: var(--shadow-md);
      overflow: hidden;
    }

    .pet-details-img {
      width: 100%;
      height: 320px;
      object-fit: cover;
      display: block;
    }

    .pet-details-img-placeholder {
      width: 100%;
      height: 320px;
      background-color: var(--section-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8rem;
    }

    .pet-details-body {
      padding: var(--space-lg);
    }

    .pet-details-body h2 {
      font-family: var(--font-display);
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      color: var(--accent);
      margin-bottom: var(--space-sm);
    }

    .pet-details-meta {
      display: flex;
      gap: var(--space-sm);
      flex-wrap: wrap;
      margin-bottom: var(--space-md);
    }

    .pet-details-meta span {
      font-size: 0.82rem;
      font-weight: 600;
      background-color: var(--body-bg);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 4px 14px;
      color: var(--text-secondary);
    }

    .pet-details-desc {
      font-size: 0.97rem;
      color: var(--text-secondary);
      line-height: 1.75;
      margin-bottom: var(--space-lg);
    }

    .pet-details-actions {
      display: flex;
      gap: var(--space-sm);
      flex-wrap: wrap;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin: var(--space-lg) var(--space-lg) 0;
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--accent);
    }
    .back-link:hover { color: var(--accent-hover); }

    .pet-not-found {
      text-align: center;
      padding: var(--space-2xl) var(--space-lg);
      color: var(--text-muted);
    }
    .pet-not-found span { font-size: 4rem; display: block; margin-bottom: var(--space-md); }
    .pet-not-found h3 { font-family: var(--font-display); font-size: 1.4rem; color: var(--text-primary); margin-bottom: var(--space-sm); }

    @media (max-width: 768px) {
      .pet-details-layout { margin: var(--space-md); }
      .pet-details-img, .pet-details-img-placeholder { height: 220px; }
      .pet-details-actions { flex-direction: column; }
      .pet-details-actions .btn { width: 100%; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <a href="index.html" class="logo">Paws &amp; More 🐾</a>
    <nav class="main-nav">
      <a href="index.html">Home</a>
      <a href="shop.html">Shop</a>
      <a href="adoption.html" class="active">Adoption</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
      <a href="policy.html">Policy</a>
    </nav>
    <div style="display:flex;align-items:center;gap:10px;">
      <a href="login.html" class="btn btn--sm">Login</a>
      <a href="register.html" class="btn btn--sm">Sign Up</a>
      <a href="profile.html" class="btn btn--sm">Profile</a>
      <a href="shop.html" class="nav-cart">🛒</a>
      <button class="nav-toggle">☰</button>
    </div>
  </header>

  <!-- BACK LINK -->
  <a href="adoption.html#pets" class="back-link">← Back to Adoption</a>

  <!-- PET DETAILS -->
  <div id="pet-details-container"></div>

  <!-- FOOTER -->
  <footer>
    <p class="footer-logo">Paws &amp; More 🐾</p>
    <nav class="footer-nav">
      <a href="index.html">Home</a>
      <a href="shop.html">Shop</a>
      <a href="adoption.html">Adoption</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
      <a href="policy.html">Policy</a>
    </nav>
    <p class="footer-copy">© 2019 Paws &amp; More. All rights reserved.</p>
  </footer>

  <script>
    /* ── PET DATA ── */
    const pets = [
      { id:1, name:'Max',     species:'dog', breed:'Golden Retriever', age:'3 years', gender:'Male',   img:'golden retriever.jpg', desc:'Max is a friendly and playful Golden Retriever who loves outdoor adventures and cuddles equally. He is great with children and other dogs.' },
      { id:2, name:'Luna',    species:'cat', breed:'Persian Cat',      age:'2 years', gender:'Female', img:'persian cat.jpg',       desc:'Luna is a gentle Persian who loves being groomed and spending lazy afternoons on soft blankets. She is calm and great for quiet homes.' },
      { id:3, name:'Buddy',   species:'dog', breed:'Beagle',           age:'2 years', gender:'Male',   img:'beagle.jpg',            desc:'Buddy is an energetic Beagle who loves long walks, playing fetch, and exploring the garden. He needs an active family.' },
      { id:4, name:'Oliver',  species:'cat', breed:'Tabby Cat',        age:'1 year',  gender:'Male',   img:'tabby cat.jpg',         desc:'Oliver is a curious and playful tabby who loves chasing toys and sunny windowsills. He is great with calm households.' },
      { id:5, name:'Daisy',   species:'dog', breed:'Poodle',           age:'3 years', gender:'Female', img:'poodle.jpg',            desc:'Daisy is a fluffy, hypoallergenic poodle who is brilliant with children and loves everyone she meets.' },
      { id:6, name:'Mittens', species:'cat', breed:'Siamese Cat',      age:'4 years', gender:'Female', img:'siamese.jpg',           desc:'Mittens is a chatty Siamese who will follow you everywhere and loves being the centre of attention.' },
      { id:7, name:'Thumper', species:'dog', breed:'Holland Lop',      age:'1 year',  gender:'Male',   img:'holland lop.jpg',       desc:'Thumper is a gentle and curious Holland Lop who loves hopping around and being held.' },
      { id:8, name:'Bella',   species:'dog', breed:'Poodle Mix',       age:'2 years', gender:'Female', img:'poodle.jpg',            desc:'Bella is a bouncy poodle mix who is hypoallergenic and absolutely loves everyone she meets.' },
    ];

    /* ── LOAD PET FROM URL ?name= ── */
    const params    = new URLSearchParams(window.location.search);
    const petName   = params.get('name');
    const pet       = pets.find(p => p.name.toLowerCase() === (petName || '').toLowerCase());
    const container = document.getElementById('pet-details-container');

    if (pet) {
      document.title = `${pet.name} — Paws & More 🐾`;
      container.innerHTML = `
        <div class="pet-details-layout">
          <img src="${pet.img}" alt="${pet.name}" class="pet-details-img"
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
          <div class="pet-details-img-placeholder" style="display:none;">
            ${pet.species === 'cat' ? '🐈' : '🐕'}
          </div>
          <div class="pet-details-body">
            <h2>${pet.name}</h2>
            <div class="pet-details-meta">
              <span>${pet.breed}</span>
              <span>${pet.age}</span>
              <span>${pet.gender}</span>
              <span>${pet.species === 'cat' ? '🐈 Cat' : '🐕 Dog'}</span>
            </div>
            <p class="pet-details-desc">${pet.desc}</p>
            <div class="pet-details-actions">
              <a href="adoption.html#pets" class="btn btn--outline">← See All Pets</a>
              <a href="adoption-form.html?name=${encodeURIComponent(pet.name)}" class="btn btn--primary">Adopt ${pet.name} 🐾</a>
            </div>
          </div>
        </div>
      `;
    } else {
      container.innerHTML = `
        <div class="pet-not-found">
          <span>🐾</span>
          <h3>Pet not found</h3>
          <p style="color:var(--text-muted);margin-bottom:var(--space-lg);">
            We couldn't find a pet called "${petName || '?'}". They may have already been adopted!
          </p>
          <a href="adoption.html#pets" class="btn btn--primary">Browse Available Pets</a>
        </div>
      `;
    }

    /* ── MOBILE NAV ── */
    document.querySelector('.nav-toggle').addEventListener('click', () => {
      document.querySelector('.main-nav').classList.toggle('open');
    });

    /* ── CART BADGE ── */
    const cart  = JSON.parse(localStorage.getItem('pawsCart') || '[]');
    const count = cart.reduce((s, i) => s + i.qty, 0);
    const navCart = document.querySelector('.nav-cart');
    if (navCart && count > 0) {
      const badge = document.createElement('span');
      badge.className = 'cart-count';
      badge.textContent = count;
      navCart.style.position = 'relative';
      navCart.appendChild(badge);
    }
  </script>

</body>
</html>
