<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paws & More | Register</title>
  <link rel="stylesheet" href="users.css" />
</head>
<body>
  <!-- HEADER -->
  <header>
    <a href="index.html" class="logo">Paws &amp; More 🐾</a>
    <nav class="main-nav">
      <a href="index.html">Home</a>
      <a href="shop.html">Shop</a>
      <a href="adoption.html">Adoption</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
      <a href="policy.html">Policy</a>
    </nav>
     <div style="display:flex;align-items:center;gap:10px;">
  <!-- 🔐 Auth buttons -->
  <a href="login.html" class="btn btn--sm">Login</a>
  <a href="register.html" class="btn btn--sm" class="active">Sign Up</a>
  <a href="profile.html" class="btn btn--sm">Profile</a>

  <!-- 🛒 Cart -->
  <a href="shop.html" class="nav-cart">🛒</a>

</div>
  </header>

  <main class="container">
    <section class="page-title">
      <h1>Register</h1>
      <p>Create your account to start shopping and manage your personal information later from your profile page.</p>
    </section>

    <section class="card">
      <form id="registerForm" class="grid-2">
        <div class="form-group">
          <label for="registerName">Full Name</label>
          <input type="text" id="registerName" placeholder="Enter your full name" />
        </div>
        <div class="form-group">
          <label for="registerEmail">Email Address</label>
          <input type="email" id="registerEmail" placeholder="Enter your email" />
        </div>
        <div class="form-group">
          <label for="registerPhone">Phone Number</label>
          <input type="tel" id="registerPhone" placeholder="Enter your phone number" />
        </div>
        <div class="form-group">
          <label for="registerAddress">Address</label>
          <input type="text" id="registerAddress" placeholder="Enter your address" />
        </div>
        <div class="form-group">
          <label for="registerPassword">Password</label>
          <input type="password" id="registerPassword" placeholder="Create a password" />
        </div>
        <div class="form-group">
          <label for="registerConfirmPassword">Confirm Password</label>
          <input type="password" id="registerConfirmPassword" placeholder="Confirm your password" />
        </div>
        <div>
          <button class="btn" type="submit">Create Account</button>
          <div id="registerMessage"></div>
        </div>
      </form>
    </section>
  </main>

  <script src="users.js"></script>
  <!-- FOOTER -->
  <footer style="text-align:center; padding:32px 20px; background:var(--primary-light); border-top:1px solid var(--border-color); margin-top:48px;">
    <p style="font-size:1.2rem; font-weight:800; margin-bottom:12px; color:var(--dark-color);">Paws &amp; More 🐾</p>
    <nav style="display:flex; justify-content:center; gap:20px; flex-wrap:wrap; margin-bottom:12px;">
      <a href="index.html">Home</a>
      <a href="shop.html">Shop</a>
      <a href="adoption.html">Adoption</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
      <a href="policy.html">Policy</a>
    </nav>
    <p style="font-size:0.82rem; color:var(--muted-text);">© 2019 Paws &amp; More. All rights reserved.</p>
  </footer>
</body>
</html>
