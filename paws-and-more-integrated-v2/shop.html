<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paws and More | Shop</title>
    <link rel="stylesheet" href="shop.css">
</head>
<body>

    
<header>
    <div class="logo"><a href="index.html" style="text-decoration:none;color:inherit;">🐾 Paws and More</a></div>
    <nav>
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="adoption.html">Adoption</a>
        <a href="login.html">Login</a>
        <button onclick="showView('cart-view')">Cart (<span id="cart-count">0</span>)</button>
    </nav>
</header>


    <main>
        <section id="shop-view" class="view active">
            <h2>Shop Pet Supplies</h2>
            
            <div class="filter-nav">
                <button class="filter-btn active" onclick="filterProducts('all')">All</button>
                <button class="filter-btn" onclick="filterProducts('dogs')">Dogs</button>
                <button class="filter-btn" onclick="filterProducts('cats')">Cats</button>
                <button class="filter-btn" onclick="filterProducts('other')">Other Pets</button>
                <button class="filter-btn" onclick="filterProducts('best-selling')">Best Selling</button>
                <button class="filter-btn" onclick="filterProducts('essentials')">Essentials</button>
            </div>

            <div id="product-grid" class="grid">
                </div>
        </section>
        <section id="cart-view" class="view hidden">
            <h2>Your Cart</h2>
            <div id="cart-items">
                </div>
            <div class="cart-summary">
                <h3>Total: $<span id="cart-total">0.00</span></h3>
                <button class="primary-btn" onclick="showView('checkout-view')">Proceed to Checkout</button>
            </div>
        </section>

        <section id="checkout-view" class="view hidden">
            <h2>Checkout</h2>
            <form id="checkout-form" onsubmit="processCheckout(event)">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Shipping Address</label>
                    <input type="text" required placeholder="123 Pet Lane">
                </div>
                <div class="form-group">
                    <label>Credit Card Number</label>
                    <input type="text" required placeholder="1234 5678 9101 1121">
                </div>
                <div class="donation-box">
                    <input type="checkbox" id="donate">
                    <label for="donate">Add $1 to my order to support the adoption center! 🐶🐱</label>
                </div>
                <button type="submit" class="primary-btn">Place Order</button>
            </form>
        </section>
    </main>

    <script src="shop.js"></script>
</body>
</html>
